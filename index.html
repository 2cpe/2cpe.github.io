<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زواج</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="invitation-card">
            <div class="card-header">
                <div class="bismillah">﷽</div>
                <div class="arabic-text">
                    بارك الله لكم
                    وبارك عليكم وجمع بينكما في خير
                </div>
            </div>

            <div class="invitation-content">
                <p class="invite-text">نتشرف ونسعد بدعوتكم لمشاركتنا الفرحة بزواج</p>
                
                <div class="names-section">
                    <div class="groom">الشاب /</div>
                    <div class="bride">على كريمة /</div>
                </div>

                <div class="date-section">
                    <div class="calendar-icon">📅</div>
                    <div class="date">يوم الخميس الموافق</div>
                </div>

                <div id="qrcode"></div>

                <div class="attendance-form">
                    <h2>تأكيد الحضور</h2>
                    <input 
                        type="text" 
                        id="guestName" 
                        placeholder="أدخل اسمك" 
                        class="input-field"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                        data-form-type="other"
                    >
                    <div class="button-group">
                        <button id="confirmYes" class="confirm-button confirm-yes">✓ سأحضر</button>
                        <button id="confirmNo" class="confirm-button confirm-no">✗ لن أتمكن من الحضور</button>
                    </div>
                </div>

                <div id="status-message"></div>

                <button id="resetButton" class="reset-button">إعادة تعيين الجهاز</button>

                <div class="location-section">
                    <div class="location-buttons">
                        <button class="location-btn">
                            <span class="icon">📍</span>
                            اضغط للوصول للموقع
                        </button>
                    </div>
                </div>

                <div class="footer-text">
                    مقدرين حرصكم على المشاركة
                    <br>
                    وتتويج المناسبة بحضوركم
                </div>

                <div class="hosts">
                    <p>الداعون: zombie & 8hrk</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
